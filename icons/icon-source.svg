<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente verde bosque profundo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3A6B3F"/>
      <stop offset="100%" stop-color="#2C5230"/>
    </linearGradient>
    <!-- Gradiente hoja principal -->
    <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D4EDD6" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Gradiente hoja secundaria -->
    <linearGradient id="leaf2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#B8D9BB" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Fondo: cuadrado redondeado verde oscuro -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Sombra suave interior para profundidad -->
  <rect width="512" height="512" rx="108" fill="none"
        stroke="#1E3D22" stroke-width="4" opacity="0.3"/>

  <!-- ──────────────────────────────────────
       SÍMBOLO: brote elegante con 3 hojas
  ────────────────────────────────────────── -->

  <!-- Tallo principal: curva orgánica -->
  <path d="M256 388 C252 350 248 310 256 218"
        stroke="white" stroke-width="13" stroke-linecap="round"
        fill="none" opacity="0.95"/>

  <!-- Raíces pequeñas -->
  <path d="M256 388 Q232 400 218 408" stroke="white" stroke-width="7"
        stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M256 388 Q280 400 294 408" stroke="white" stroke-width="7"
        stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M256 388 Q256 406 256 416" stroke="white" stroke-width="7"
        stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Hoja izquierda grande: curva botánica suave -->
  <path d="M256 310
           C240 292 210 285 190 268
           C175 254 172 236 180 224
           C196 218 216 226 232 240
           C244 252 252 270 256 288 Z"
        fill="url(#leaf1)"/>
  <!-- Nervio central hoja izquierda -->
  <path d="M256 310 C244 290 218 264 184 226"
        stroke="#3A6B3F" stroke-width="2.5" fill="none"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Hoja derecha: más pequeña y elevada -->
  <path d="M256 272
           C272 254 302 247 322 230
           C337 216 340 198 332 186
           C316 180 296 188 280 202
           C268 214 260 232 256 250 Z"
        fill="url(#leaf2)"/>
  <!-- Nervio central hoja derecha -->
  <path d="M256 272 C268 252 296 220 330 188"
        stroke="#3A6B3F" stroke-width="2" fill="none"
        stroke-linecap="round" opacity="0.4"/>

  <!-- Brote apical: yema terminal elegante -->
  <!-- Pétalo trasero -->
  <ellipse cx="256" cy="204" rx="12" ry="20"
           transform="rotate(-15 256 204)"
           fill="white" opacity="0.6"/>
  <!-- Pétalo delantero -->
  <ellipse cx="256" cy="202" rx="10" ry="22"
           transform="rotate(8 256 202)"
           fill="white" opacity="0.9"/>
  <!-- Núcleo -->
  <ellipse cx="256" cy="200" rx="7" ry="14" fill="white"/>
  <!-- Punta verde del brote -->
  <ellipse cx="256" cy="190" rx="5" ry="9" fill="#3A6B3F" opacity="0.7"/>

  <!-- ──────────────────────────────────────
       LETRA "R" integrada como watermark
       (muy sutil, en la esquina)
  ────────────────────────────────────────── -->
  <text x="418" y="462"
        font-family="Georgia, serif"
        font-size="54" font-style="italic"
        fill="white" opacity="0.18"
        text-anchor="middle">r</text>
</svg>
